name: Bug report
description: Report a defect in repository structure, documentation, scripts, or future framework behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed problem and its impact.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: List the affected module, document, script, or workflow.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Explain the expected result or contract.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or evidence
      description: Provide steps, examples, or references that demonstrate the issue.
    validations:
      required: true
